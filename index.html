<div id="tmtNewsApp"></div>
<script>
(function(){
  const LIST_TITLE  = "TMT & SI News";
  const LIB_TITLE   = "Shared Documents";
  const UPLOAD_SUB  = "News";
  const LIKE_COUNT_COL  = "Likes Count";      // Number column
  const LIKED_BY_COL    = "Liked By Users";   // Multiple lines of text (plain)
  const VIEW_COUNT_COL  = "Views Count";       // Number column
  const VIEWED_BY_COL   = "Viewed By Users";  // Multiple lines of text (plain)
  // One-like/view per person enforced via these text columns (cross-device)

  window.__TMT__ = window.__TMT__ || {};
  const NS = window.__TMT__;
  if(NS.hardInit){ tryBoot(); return; }
  NS.hardInit = true;

  function tryBoot(){
    var r = document.getElementById("tmtNewsApp");
    if(!r || r.__booted) return;
    setTimeout(function(){
      var r2 = document.getElementById("tmtNewsApp");
      if(r2 && !r2.__booted) boot(r2);
    }, 0);
  }

  if(!NS.obs){
    NS.obs = new MutationObserver(function(){
      var r = document.getElementById("tmtNewsApp");
      if(r && !r.__booted && !r.querySelector(".tmt-shell")){ tryBoot(); }
    });
    NS.obs.observe(document.body, {childList:true, subtree:true});
  }

  document.addEventListener("DOMContentLoaded", tryBoot);
  window.addEventListener("load", tryBoot);
  tryBoot();

  function boot(root){
    root.__booted = true;
    // Disconnect immediately — prevents SP DOM mutations from re-triggering boot
    if(NS.obs){ try{ NS.obs.disconnect(); }catch(e){} NS.obs = null; }

    var webAbs = (window._spPageContextInfo && _spPageContextInfo.webAbsoluteUrl)
      || (location.origin + location.pathname.split("/SitePages/")[0]);
    var webRel = (window._spPageContextInfo && _spPageContextInfo.webServerRelativeUrl)
      || (location.pathname.split("/SitePages/")[0] || "");
    var api      = webAbs.replace(/\/$/,"") + "/_api";
    var libRel   = (webRel.replace(/\/$/,"") + "/" + LIB_TITLE).replace(/\/{2,}/g,"/");
    var upFolder = (libRel.replace(/\/$/,"") + "/" + UPLOAD_SUB).replace(/\/{2,}/g,"/");

    // ── tiny helpers ──────────────────────────
    function $(s){ return root.querySelector(s); }
    function on(el, ev, fn){ if(el) el.addEventListener(ev, fn); }
    function esc(s){
      return String(s == null ? "" : s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }

    function fmtDate(d){
      if(!d) return "";
      var dt = new Date(d); if(isNaN(dt)) return "";
      return dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    }

    function relTime(d){
      if(!d) return "";
      var dt = new Date(d); if(isNaN(dt)) return "";
      var now = new Date(), ms = now - dt;
      var mins = Math.floor(ms/60000), hrs = Math.floor(ms/3600000);
      var today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
      var dDay  = new Date(dt.getFullYear(),dt.getMonth(),dt.getDate());
      var dayD  = Math.round((today - dDay) / 86400000);
      if(mins < 1)  return "Just now";
      if(mins < 60) return mins === 1 ? "1 minute ago" : mins + " minutes ago";
      if(hrs < 24 && dayD === 0) return hrs === 1 ? "1 hour ago" : hrs + " hours ago";
      if(dayD === 1) return "Yesterday";
      if(dayD < 7)  return dayD + " days ago";
      if(dayD < 14) return "Last week";
      if(dayD < 30) return Math.floor(dayD/7) + " weeks ago";
      if(dayD < 365)return Math.floor(dayD/30) + " months ago";
      return fmtDate(d);
    }

    function initials(name){
      if(!name) return "?";
      var p = name.trim().split(/\s+/);
      return p.length === 1 ? p[0].slice(0,2).toUpperCase() : (p[0][0] + p[p.length-1][0]).toUpperCase();
    }

    function toIso(s){
      if(!s) return null;
      var d = new Date(s); if(!isNaN(d)) return d.toISOString();
      var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if(m) return new Date(+m[3],+m[1]-1,+m[2]).toISOString();
      return null;
    }

    function normalizeUrl(u){
      var s = String(u||"").trim(); if(!s) return "";
      if(/^https?:\/\//i.test(s) || /^mailto:/i.test(s)) return s;
      if(/^www\./i.test(s)) return "https://" + s;
      if(s.startsWith("/")) return location.origin + s;
      return "https://" + s;
    }

    function srvRel(absUrl){
      var s = String(absUrl||"").trim(); if(!s) return "";
      if(/^https?:\/\//i.test(s)){
        try{ return decodeURIComponent(new URL(s).pathname); }catch(e){ return s; }
      }
      return s.startsWith("/") ? s : "/" + s;
    }

    function extOf(n){
      var m = String(n||"").split("?")[0].match(/\.([A-Za-z0-9]+)$/);
      return m ? m[1].toLowerCase() : "";
    }

    var VID_EXT = ["mp4","mov","m4v","webm"];
    var OFF_EXT = ["ppt","pptx","doc","docx","xls","xlsx"];
    function isVid(e){ return VID_EXT.indexOf(e) > -1; }
    function isOff(e){ return OFF_EXT.indexOf(e) > -1; }
    function isPdf(e){ return e === "pdf"; }

    function linkify(text){
      // Work on raw text — escape only non-URL segments to avoid regex char class
      // excluding letters like t, l, ; that appear in &lt; &gt; entity names
      var raw = String(text||"");
      var urlRegex = /(https?:\/\/[^\s<>"']+)/gi;
      var parts = raw.split(urlRegex);
      return parts.map(function(part, i){
        // Odd-indexed parts are URL matches
        if(i % 2 === 1){
          // Strip leading underscores or punctuation that got captured
          var url = part.replace(/^[_*\s]+/, "").replace(/[.,;:!?)_]+$/, "");
          if(!url) return esc(part);
          return '<a href="'+esc(normalizeUrl(url))+'" target="_blank" rel="noopener" onclick="window.open(this.href,\'_blank\',\'noopener\');return false;">'+esc(url)+'</a>';
        }
        return esc(part);
      }).join("");
    }

    // Convert a SharePoint sharing URL (/:p:/r/...) to a server-relative path
    // that getpreview.ashx can use. Returns "" for GUID-only URLs.
    function spShareToServerRel(url){
      var m = String(url||"").match(/sharepoint\.com\/:[pwxbuf]:(?:\/r)?(\/sites\/[^?#]+)/i);
      if(m) return decodeURIComponent(m[1]);
      try{ return decodeURIComponent(new URL(url).pathname); }catch(e){ return ""; }
    }

    // SP getpreview.ashx — server-side thumbnail, no canvas/CSP issues
    function previewUrl(attAbs){
      var sr = srvRel(attAbs);
      return webAbs.replace(/\/$/,"") + "/_layouts/15/getpreview.ashx?path=" + encodeURIComponent(sr) + "&resolution=2";
    }

    // SP stream URL for "open in SharePoint" link
    function spStreamUrl(attAbs, attName){
      var s   = String(attAbs||"").trim();
      var ext = extOf(attName || attAbs);

      // If the stored URL is already a Doc.aspx or sharing link, use it directly —
      // don't try to extract the path from it, which would wrap it in another Doc.aspx
      if(/\/_layouts\/15\/Doc\.aspx/i.test(s)) return s;
      if(/sharepoint\.com\/:(?:p|w|x|b|u|f):/i.test(s)) return s;

      var sr = srvRel(s);
      if(isVid(ext)) return location.origin + "/_layouts/15/stream.aspx?id=" + encodeURIComponent(sr);
      if(isOff(ext) || isPdf(ext)) return location.origin + "/_layouts/15/Doc.aspx?path=" + encodeURIComponent(sr) + "&action=default";
      return location.origin + sr;
    }

    var yn = function(v){ return ["yes","y","true","1"].indexOf(String(v||"").trim().toLowerCase()) > -1 ? "Yes" : "No"; };

    // Current user — fetched first so renderGrid has it before painting cards
    var currentUser = "";
    try{
      if(window._spPageContextInfo){
        currentUser = _spPageContextInfo.userDisplayName || _spPageContextInfo.userLoginName || "";
      }
    }catch(e){}

    function loadCurrentUser(){
      if(currentUser) return Promise.resolve(currentUser);
      return fetch(api+"/web/currentuser?$select=Title", {headers:{Accept:"application/json;odata=verbose"}})
        .then(function(r){ return r.json(); })
        .then(function(j){ if(j.d&&j.d.Title) currentUser = j.d.Title; return currentUser; })
        .catch(function(){ return currentUser; });
    }

    // ── SP REST ───────────────────────────────
    function getDigest(){
      return fetch(api + "/contextinfo", {method:"POST", headers:{Accept:"application/json;odata=verbose"}})
        .then(function(r){ if(!r.ok) throw new Error("Digest "+r.status); return r.json(); })
        .then(function(j){ return j.d.GetContextWebInformation.FormDigestValue; });
    }

    function spGet(url){
      return fetch(url, {headers:{Accept:"application/json;odata=verbose"}})
        .then(function(r){
          if(!r.ok){ var e = new Error("GET "+r.status); e.status = r.status; throw e; }
          return r.json();
        });
    }

    function spPost(url, body, dg, method){
      var h = {Accept:"application/json;odata=verbose","Content-Type":"application/json;odata=verbose","X-RequestDigest":dg};
      if(method) h["X-HTTP-Method"] = method;
      if(method === "MERGE" || method === "DELETE") h["IF-MATCH"] = "*";
      return fetch(url, {method:"POST", headers:h, body: body ? JSON.stringify(body) : null})
        .then(function(r){
          if(!r.ok) return r.text().then(function(t){ throw new Error((method||"POST")+" "+r.status+": "+t); });
          return r;
        });
    }

    // ── List metadata ─────────────────────────
    var fieldMap = {}, entityType = "";
    var likeCountField = "", likedByField = "", viewCountField = "", viewedByField = "";
    var categoryChoices = []; // choices defined in the SP Category column

    function loadMeta(){
      var enc = encodeURIComponent(LIST_TITLE).replace(/%20/g," ");
      return Promise.all([
        spGet(api+"/web/lists/GetByTitle('"+enc+"')/Fields?$select=Title,InternalName,TypeAsString,Choices"),
        spGet(api+"/web/lists/GetByTitle('"+enc+"')?$select=ListItemEntityTypeFullName")
      ]).then(function(results){
        var fj = results[0], lj = results[1];
        (fj.d.results||[]).forEach(function(f){
          var title = String(f.Title||"").trim();
          fieldMap[title] = {n: f.InternalName, t: f.TypeAsString};
          var tl = title.toLowerCase();
          if(tl === LIKE_COUNT_COL.toLowerCase())  likeCountField = f.InternalName;
          if(tl === LIKED_BY_COL.toLowerCase())    likedByField   = f.InternalName;
          if(tl === VIEW_COUNT_COL.toLowerCase())  viewCountField = f.InternalName;
          if(tl === VIEWED_BY_COL.toLowerCase())   viewedByField  = f.InternalName;
          // Capture choices from the Category column
          if(tl === "category" && f.Choices && f.Choices.results){
            categoryChoices = f.Choices.results.map(function(c){ return String(c).trim(); }).filter(Boolean);
          }
        });
        entityType = lj.d.ListItemEntityTypeFullName;
// field names resolved in loadMeta
      });
    }

    function fi(disp){ return fieldMap[disp] ? fieldMap[disp].n : null; }
    function fiv(row, disp){ var n = fi(disp); return (n && row[n] !== undefined) ? row[n] : row[disp]; }

    // ── Upload ────────────────────────────────
    function ensureFolder(dg){
      var enc = encodeURIComponent(upFolder).replace(/%20/g," ");
      return spGet(api+"/web/GetFolderByServerRelativeUrl('"+enc+"')")
        .then(function(){ return; })
        .catch(function(e){
          if(e.status !== 404) throw e;
          var encLib = encodeURIComponent(libRel).replace(/%20/g," ");
          return spGet(api+"/web/GetFolderByServerRelativeUrl('"+encLib+"')")
            .catch(function(){ throw new Error('Library "'+LIB_TITLE+'" not found'); })
            .then(function(){
              return fetch(api+"/web/folders/add('"+enc+"')",
                {method:"POST", headers:{Accept:"application/json;odata=verbose","X-RequestDigest":dg}})
                .then(function(r){ if(!r.ok) throw new Error("Could not create upload folder"); });
            });
        });
    }

    function uploadFile(file, dg){
      return ensureFolder(dg).then(function(){
        var safe = file.name.replace(/[^\w.\- ()]/g,"_");
        var pts  = safe.split("."), ext = pts.length > 1 ? pts.pop() : "", base = pts.join(".")||"file";
        var name = ext ? (base+"-"+Date.now().toString(36)+"."+ext) : (base+"-"+Date.now().toString(36));
        var enc  = encodeURIComponent(upFolder).replace(/%20/g," ");
        var encN = encodeURIComponent(name).replace(/%20/g," ");
        var url  = api+"/web/GetFolderByServerRelativeUrl('"+enc+"')/Files/add(url='"+encN+"',overwrite=true)";

        return new Promise(function(readResolve, readReject){
          var reader = new FileReader();
          reader.onload = function(e){ readResolve(e.target.result); };
          reader.onerror = function(){ readReject(new Error("Could not read file")); };
          reader.readAsArrayBuffer(file);
        }).then(function(buf){
          return new Promise(function(resolve, reject){
            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            xhr.setRequestHeader("Accept","application/json;odata=verbose");
            xhr.setRequestHeader("X-RequestDigest", dg);
            xhr.setRequestHeader("Content-Type","application/octet-stream");
            xhr.upload.onprogress = function(evt){
              if(!evt.lengthComputable) return;
              var p = Math.round(evt.loaded/evt.total*100);
              var pf = $("#pFill"); if(pf) pf.style.width = p+"%";
              var pp = $("#pPct");  if(pp) pp.textContent = p+"%";
              var pl = $("#pLabel");if(pl) pl.textContent = p < 100 ? "Uploading…" : "Processing…";
            };
            xhr.onload = function(){
              if(xhr.status === 200 || xhr.status === 201){
                var d = JSON.parse(xhr.responseText);
                // Use location.origin + serverRelativeUrl (same as reference app).
                // webAbs already contains the site path so adding serverRelativeUrl
                // would double it: /sites/X/sites/X/... — always wrong.
                var fileUrl = location.origin + d.d.ServerRelativeUrl;
                resolve({ abs: fileUrl, name: name });
              } else { reject(new Error("Upload failed: "+xhr.status)); }
            };
            xhr.onerror = function(){ reject(new Error("Network error during upload")); };
            xhr.send(buf);
          });
        });
      });
    }

    // ── State ─────────────────────────────────
    var S = { items:[], cats:["All"], cat:"All", sort:"newest", q:"", file:null, editId:null, view:"grid" };

    // ── Load items ────────────────────────────
    function loadItems(){
      var enc = encodeURIComponent(LIST_TITLE).replace(/%20/g," ");
      var url = api+"/web/lists/GetByTitle('"+enc+"')/items"
        + "?$select=*,Author/Title&$expand=Author&$top=200";

      return spGet(url).then(function(json){
        var now = new Date();
        S.items = (json.d.results||[]).map(function(r){
          var pub = fiv(r,"Publish Date") || r.Created;
          var exp = fiv(r,"Expires On");
          var expDt = exp ? new Date(exp) : null;
          var attRaw = (fiv(r,"Attachment URL")||"").trim();
          return {
            id: r.Id,
            headline: (fiv(r,"Headline") || r.Title || "").trim(),
            body:     (fiv(r,"Body") || fiv(r,"Summary") || "").trim(),
            link:      normalizeUrl((fiv(r,"Link")||"").trim()),
            category: (fiv(r,"Category") || "General").trim(),
            featured:  String(fiv(r,"Featured") || "No"),
            publishDate: pub,
            // Use Id as primary sort key for "newest" since it's always sequential.
            // publishTime used for "oldest" where actual date matters.
            publishTime: new Date(pub||0).getTime() || 0,
            spId: r.Id, // sequential SP item ID — reliable newest-first sort
            attachmentUrl:  attRaw ? normalizeUrl(attRaw) : "",
            attachmentName: (fiv(r,"Attachment Name")||"").trim(),
            author: (r.Author && r.Author.Title) ? r.Author.Title : "",
            likeCount: 0, likedBy: "",
            viewCount: 0, viewedBy: "",
            expired: !!(expDt && !isNaN(expDt) && expDt < now)
          };
        }).filter(function(x){ return !x.expired; });

        // Build category list: merge item-derived cats with SP column choices
        var cats = [];
        S.items.forEach(function(i){ if(i.category && cats.indexOf(i.category)<0) cats.push(i.category); });
        // Add any SP column choices not already represented by existing items
        categoryChoices.forEach(function(c){ if(cats.indexOf(c) < 0) cats.push(c); });
        cats.sort();
        S.cats = ["All"].concat(cats);

        $("#tmtCat").innerHTML = S.cats.map(function(c){
          return '<option value="'+esc(c)+'"'+(S.cat===c?" selected":"")+'>'+esc(c)+'</option>';
        }).join("");

        // Form dropdown uses full SP choices list (all defined options, not just used ones)
        var formCats = categoryChoices.length ? categoryChoices.slice().sort() : (cats.length ? cats : ["General"]);
        $("#fCategory").innerHTML = formCats.map(function(c){
          return '<option value="'+esc(c)+'">'+esc(c)+'</option>';
        }).join("");

        renderGrid();

        // Fetch like/view data separately using explicit internal field names
        var countFields = ["Id", likeCountField, likedByField, viewCountField, viewedByField].filter(Boolean);
        if(countFields.length > 1){
          spGet(api+"/web/lists/GetByTitle('"+enc+"')/items?$select="+countFields.join(",")+"&$top=200")
            .then(function(lj){
              var changed = false;
              (lj.d.results||[]).forEach(function(lr){
                var item = S.items.filter(function(x){ return x.id === lr.Id; })[0];
                if(!item) return;
                if(likeCountField) item.likeCount = parseInt(lr[likeCountField]||0,10)||0;
                if(likedByField)   item.likedBy   = String(lr[likedByField]||"").trim();
                if(viewCountField) item.viewCount = parseInt(lr[viewCountField]||0,10)||0;
                if(viewedByField)  item.viewedBy  = String(lr[viewedByField]||"").trim();
                changed = true;
              });
              if(changed) renderGrid();
            }).catch(function(e){ console.warn("[TMT] Count fetch failed:", e.message); });
        }
      });
    }

    function filtered(){
      var a = S.items.slice();
      if(S.cat !== "All") a = a.filter(function(i){ return i.category === S.cat; });
      if(S.q){
        var q = S.q.toLowerCase();
        a = a.filter(function(i){ return (i.headline+" "+i.body+" "+i.category).toLowerCase().indexOf(q) > -1; });
      }
      a.sort(function(a,b){
        var af = ["yes","true","1"].indexOf(String(a.featured).toLowerCase()) > -1;
        var bf = ["yes","true","1"].indexOf(String(b.featured).toLowerCase()) > -1;
        if(af !== bf) return af ? -1 : 1;
        // Newest: sort by SP item Id descending (always sequential, never wrong)
        // Oldest: sort by actual publish date ascending
        if(S.sort === "oldest") return a.publishTime - b.publishTime;
        return b.spId - a.spId;
      });
      return a;
    }

    // ── Thumbnail HTML ────────────────────────
    var CAT_COLORS = {
      "Leadership":"#63DF4E","Enablement":"#60A5FA","Win Story":"#34D399","Win":"#34D399",
      "Best Practices":"#FBBF24","POC Spotlight":"#F472B6","Culture":"#FB923C",
      "General":"#81B5A1","AI":"#FF7EB3","IT":"#4A9EFF","CRM":"#FF6B8A",
      "Video":"#A78BFA","News":"#9BB8C8",
      "Pipeline":"#F59E0B","Competitive":"#EF4444","Product":"#8B5CF6",
      "Telco":"#06B6D4","Media":"#EC4899","Technology":"#3B82F6",
      "System Integrators":"#10B981","Moveworks":"#F97316","People":"#84CC16",
      "Other":"#6B7280"
    };
    function catColor(cat){ return CAT_COLORS[cat] || "#5E8899"; }

    // Cache extracted poster frames so we don't re-extract on every renderGrid call
    var posterCache = {};
    // Cache for og:image thumbnails fetched from linked URLs
    var ogCache = {};

    function thumbHtml(item){
      var att  = item.attachmentUrl || "";
      var link = item.link || "";
      var cat  = item.category || "General";
      var col  = catColor(cat);

      // ── Resolve extension & file type ──────────────────────────────────────
      var nameForExt = item.attachmentName || "";
      if(!nameForExt && att){
        var fp = att.match(/[?&]file=([^&]+)/i);
        if(fp) nameForExt = decodeURIComponent(fp[1]);
      }
      var ext = extOf(nameForExt || att);
      // SharePoint sharing URL type character: /:p:/, /:p:/r/, /:w:/, etc.
      if(att && !isOff(ext) && !isVid(ext)){
        var tcM2 = att.match(/sharepoint\.com\/:([pwxb])(?:\/r)?:/i);
        if(tcM2){ var tcMap2={p:"pptx",w:"docx",x:"xlsx",b:"pdf"}; ext=tcMap2[tcM2[1].toLowerCase()]||ext; }
        if(!isOff(ext) && /Doc2?\.aspx/i.test(att) && /sourcedoc=/i.test(att)) ext="pptx";
      }
      var vid = isVid(ext);
      var off = isOff(ext);
      var playOverlay = '<div class="playOverlay" style="z-index:2;"><div class="playBtn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>';

      // ── Helper: Office icon placeholder ────────────────────────────────────
      function offPlaceholder(e, extraAttrs){
        var icons={pptx:"📊",ppt:"📊",docx:"📝",doc:"📝",xlsx:"📈",xls:"📈",pdf:"📄"};
        var cols={pptx:"#C43E1C",ppt:"#C43E1C",docx:"#185ABD",doc:"#185ABD",xlsx:"#107C41",xls:"#107C41",pdf:"#E74C3C"};
        var ic=icons[e]||"📄", fc=cols[e]||"#5E8899";
        return '<div class="thumb" style="background:linear-gradient(135deg,#01131D,#053347);"'+(extraAttrs||"")+'>'
          +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;">'
          +'<div style="font-size:36px;">'+ic+'</div>'
          +'<div style="font-size:9px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:2px 10px;border-radius:999px;background:'+fc+'22;color:'+fc+';border:1px solid '+fc+'44;">'+e.toUpperCase()+'</div>'
          +'</div></div>';
      }

      // ── Helper: domain link placeholder ────────────────────────────────────
      function domainPlaceholder(url){
        var d=""; try{ d=new URL(url).hostname.replace(/^www\./,""); }catch(e2){}
        return '<div class="thumb" style="background:linear-gradient(135deg,#01131D,#053347);">'
          +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px;">'
          +'<div style="font-size:24px;opacity:0.5;">🔗</div>'
          +(d?'<div style="font-size:10px;color:#5E8899;text-align:center;font-weight:700;word-break:break-all;max-width:140px;">'+esc(d)+'</div>':"")
          +'</div></div>';
      }

      // ── Helper: getpreview.ashx thumbnail ──────────────────────────────────
      function previewThumb(fileUrl){
        var sr = srvRel(fileUrl);
        var prev = location.origin+"/_layouts/15/getpreview.ashx?path="+encodeURIComponent(sr)+"&resolution=2";
        return '<div class="thumb" style="background:linear-gradient(135deg,#01131D,#053347);">'
          +'<img src="'+esc(prev)+'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;" onerror="this.remove()" />'
          +'</div>';
      }

      // ══════════════════════════════════════════════════════════════════════
      // CASE 1: Video attachment

      if(vid && att){

      // ══════════════════════════════════════════════════════════════════════
      if(att && (off || isPdf(ext))){
        // GUID-only sharing links can't be resolved by getpreview.ashx
        var hasGuidOnly = /sourcedoc=/i.test(att) && !/[?&]file=/i.test(att) && (function(){
          if(!/sharepoint\.com\/:/.test(att)) return true; // no type char = definitely GUID-only
          var sr = spShareToServerRel(att) || srvRel(att);

        })();
        var isExternal = !/sharepoint\.com/i.test(att) && !/^\//i.test(att)
          && /^https?:/i.test(att) && att.indexOf(location.hostname.split(".")[0]) === -1;
        if(hasGuidOnly || isExternal){
          var guidM2 = att.match(/sourcedoc=%7B([^%]+)%7D/i)||att.match(/sourcedoc=\{([^}]+)\}/i);
          var guidAttr2 = guidM2 ? ' data-guid="'+esc(guidM2[1])+'"' : '';
          return offPlaceholder(ext, guidAttr2);
        }
        // For sharing URLs (/:p:/r/...) extract the real server-relative path
        var sr2;
        var fp3 = att.match(/[?&]file=([^&]+)/i);
        if(fp3){
          var folderPath = spShareToServerRel(att.split("?")[0]) || srvRel(att.split("?")[0]);
          folderPath = folderPath.replace(/\/[^/]+$/, "");
          sr2 = folderPath + "/" + decodeURIComponent(fp3[1]);
        } else if(/sharepoint\.com\/:/.test(att)){
          sr2 = spShareToServerRel(att);
        } else {
          sr2 = srvRel(att);
        }
        // If path can't be resolved or goes through /_layouts/, show icon
        if(!sr2 || /\/_layouts\//i.test(sr2)){
          return offPlaceholder(ext);

        var prev2 = location.origin+"/_layouts/15/getpreview.ashx?path="+encodeURIComponent(sr2)+"&resolution=2";
        return '<div class="thumb" style="background:linear-gradient(135deg,#01131D,#053347);">'
          +'<img src="'+esc(prev2)+'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentNode.innerHTML=\''+offPlaceholder(ext).replace(/'/g,"\\'").replace(/\\/g,"\\\\")+'\'" />'
          +'</div>';

      // ══════════════════════════════════════════════════════════════════════
      // CASE 3: Image attachment — display directly
      // ══════════════════════════════════════════════════════════════════════
      if(att && ["jpg","jpeg","png","gif","webp","bmp","svg"].indexOf(ext) > -1){
        var imgUrl = location.origin + srvRel(att);
        return '<div class="thumb" style="background:#000;">'
          +'<img src="'+esc(imgUrl)+'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;" onerror="this.remove()" />'

          return '<div class="thumb" style="background:#000;">'

            +'<div style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.6);border-radius:4px;padding:2px 7px;font-size:9px;color:#9BB8C8;font-weight:700;">🔗 LINK</div>'
            +'</div>';
        }

        // Auth-gated or failed fetch — show domain immediately, no spinner
        if(isSkippedDomain(link) || ogImg === ""){
          // SharePoint file links — try getpreview.ashx same as attachments
          var spFileLink = /sharepoint\.com/i.test(link) && (
            /sharepoint\.com\/:([pwxb])(?:\/r)?:/i.test(link) ||  // sharing URL type char
            /\.(pptx?|docx?|xlsx?|pdf)(\?|$)/i.test(link) ||      // direct file URL
            /Doc2?\.aspx/i.test(link)                              // Doc.aspx viewer
          );
          if(spFileLink){
            // Detect file type — type char > file extension > Doc.aspx default to pptx
            var spTcM = link.match(/sharepoint\.com\/:([ pwxb]):(?:\/r)?:/i);
            var spTcMap3 = {p:"pptx",w:"docx",x:"xlsx",b:"pdf"};
            var spExt3 = (spTcM && spTcMap3[spTcM[1].toLowerCase()])
              || (/\.(pptx?|docx?|xlsx?|pdf)(\?|$)/i.test(link) ? extOf(link) : null)
              || (/Doc2?\.aspx/i.test(link) ? "pptx" : null)
              || "pptx";

            // Extract GUID if present
            var spGuidMatch = link.match(/sourcedoc=%7B([^%]+)%7D/i) || link.match(/sourcedoc=\{([^}]+)\}/i);
            var spGuid = spGuidMatch ? spGuidMatch[1] : "";
            var spGuidAttr = spGuid ? ' data-guid="'+esc(spGuid)+'"' : '';

            // A URL is GUID-only if it has sourcedoc= but no &file= param
            // AND either has no type-char prefix, OR its resolved path goes through /_layouts/

            var spSrCheck = spShareToServerRel(link) || srvRel(link);
            var spIsGuidOnly = /sourcedoc=/i.test(link) && !/[?&]file=/i.test(link)
              && (!spSrCheck || /\/_layouts\//i.test(spSrCheck));

            if(spIsGuidOnly){
              return offPlaceholder(spExt3, spGuidAttr);
            }
            var spSr = spShareToServerRel(link) || srvRel(link);
            var spFp = link.match(/[?&]file=([^&]+)/i);
            if(spFp){
              var spFolder = spSr.replace(/\/[^/]+$/, "");
              spSr = spFolder + "/" + decodeURIComponent(spFp[1]);

            if(!spSr || /\/_layouts\//i.test(spSr)){

            var spPrev = location.origin+"/_layouts/15/getpreview.ashx?path="+encodeURIComponent(spSr)+"&resolution=2";
            return '<div class="thumb" style="background:linear-gradient(135deg,#01131D,#053347);">'

          var isZoom = /zoom\.us/i.test(link);
          if(isZoom){
            return '<div class="thumb" style="background:linear-gradient(135deg,#0E72ED,#1A82FF);">'
              +'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;">'

              +'</div>'

        // Unknown — show spinner while fetchOgImages runs async
        return '<div class="thumb" style="background:linear-gradient(135deg,#01131D,#053347);" data-ogurl="'+esc(link)+'">'
          +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;">'
          +'<div style="font-size:22px;opacity:0.5;">🔗</div>'
          +'<div style="font-size:9px;color:#5E8899;text-transform:uppercase;letter-spacing:1px;">Loading preview…</div>'
          +'</div></div>';

      // ══════════════════════════════════════════════════════════════════════
      // CASE 6: No attachment, no link — category color placeholder
      // ══════════════════════════════════════════════════════════════════════
      return '<div class="thumb" style="background:linear-gradient(135deg,#01131D,#053347);">'
        +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">'
        +'<div style="font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:999px;background:'+col+'22;color:'+col+';border:1px solid '+col+'44;">'+esc(cat)+'</div>'

    // Domains that require auth — skip og:image fetch, show placeholder immediately
    var SKIP_OG_DOMAINS = ["zoom.us","teams.microsoft.com","microsoftstream.com",
      "web.microsoftstream.com","login.microsoftonline.com","linkedin.com","salesforce.com",
      "sharepoint.com"]; // SP requires auth — can't fetch og:image via proxy

    function isSkippedDomain(url){
      try{
        var host = new URL(url).hostname.replace(/^www\./,"");
        return SKIP_OG_DOMAINS.some(function(d){ return host === d || host.endsWith("."+d); });
      }catch(e){ return false; }
    }

    function fetchOgImages(items){
      items.forEach(function(item){
        if(item.attachmentUrl) return;
        if(!item.link) return;
        if(ogCache[item.link] !== undefined) return;

        ogCache[item.link] = null;

        // YouTube: instant thumbnail, no fetch needed
        var ytMatch = item.link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
        if(ytMatch){
          ogCache[item.link] = "https://img.youtube.com/vi/" + ytMatch[1] + "/mqdefault.jpg";
          injectOgThumb(item.link, ogCache[item.link]);
          return;
        }

        // Skip auth-gated domains — they'll never return a public og:image
        if(isSkippedDomain(item.link)){
          ogCache[item.link] = ""; // cache empty so thumbHtml shows domain placeholder immediately
          // Trigger re-render of this card's thumb without full renderGrid
          var thumbEl = root.querySelector('[data-ogurl="'+item.link+'"]');
          if(thumbEl){
            var domain2 = "";
            try{ domain2 = new URL(item.link).hostname.replace(/^www\./,""); }catch(e){}
            thumbEl.removeAttribute("data-ogurl");
            thumbEl.innerHTML =
              '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px;">'
              + '<div style="font-size:24px;opacity:0.5;">🔗</div>'
              + (domain2 ? '<div style="font-size:10px;color:#5E8899;text-align:center;font-weight:700;letter-spacing:.3px;word-break:break-all;max-width:140px;">'+esc(domain2)+'</div>' : "")
              + '</div>';
          }
          return;
        }

        // General fetch with 5s timeout
        var done = false;
        var timer = setTimeout(function(){
          if(done) return; done = true;
          ogCache[item.link] = "";
          clearOgPlaceholder(item.link);
        }, 5000);

        fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(item.link))
          .then(function(r){ return r.json(); })
          .then(function(data){
            if(done) return; done = true; clearTimeout(timer);
            var html = data.contents || "";
            var m = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                  || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
            if(m && m[1]){
              ogCache[item.link] = m[1];
              injectOgThumb(item.link, m[1]);
            } else {
              ogCache[item.link] = "";
              clearOgPlaceholder(item.link);
            }
          })
          .catch(function(){
            if(done) return; done = true; clearTimeout(timer);
            ogCache[item.link] = "";
            clearOgPlaceholder(item.link);
          });
      });
    }

    function injectOgThumb(link, imgUrl){

        thumb.removeAttribute("data-ogurl");

          '<img src="'+esc(imgUrl)+'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;" onerror="this.remove()" />'
          + '<div style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.6);border-radius:4px;padding:2px 7px;font-size:9px;color:#9BB8C8;font-weight:700;">🔗 LINK</div>';

    function clearOgPlaceholder(link){
      var thumbs = root.querySelectorAll('[data-ogurl="'+link+'"]');

    function thumbEmailBtn(item){
      var subject = encodeURIComponent("Base Camp: " + (item.headline || "News Update"));
      var postUrl = location.href.split("#")[0] + "#post-" + item.id;

    // Uses the same-origin URL that works for video playback — canvas can read it too.
    // Resolve GUID-based sourcedoc URLs to real file paths so getpreview.ashx can generate thumbnails.
    // Uses SP REST GetFileById to get the ServerRelativeUrl from the GUID.
    var guidCache = {};

    function resolveGuidThumbnails(items){
      items.forEach(function(item){
        var urls = [item.attachmentUrl, item.link].filter(Boolean);
        urls.forEach(function(url){
          if(!/sourcedoc=/i.test(url)) return;
          if(/[?&]file=/i.test(url)) return;
          var guidMatch = url.match(/sourcedoc=%7B([^%]+)%7D/i) || url.match(/sourcedoc=\{([^}]+)\}/i);
          if(!guidMatch) return;
          var guid = guidMatch[1];
          if(guidCache[guid]) return;
          guidCache[guid] = true;

          // getpreview.ashx supports UniqueId directly — no cross-site API call needed
          var prevUrl = location.origin+"/_layouts/15/getpreview.ashx?UniqueId="+encodeURIComponent("{"+guid+"}")+"&resolution=2";
          root.querySelectorAll('.thumb[data-guid="'+guid+'"]').forEach(function(thumb){
            thumb.removeAttribute("data-guid");
            var img = document.createElement("img");
            img.src = prevUrl;
            img.alt = "";
            img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;";
            img.onerror = function(){ img.remove(); };
            thumb.innerHTML = "";
            thumb.style.background = "linear-gradient(135deg,#01131D,#053347)";
            thumb.appendChild(img);
          });
        });
      });
    }

    function extractVideoFrames(items){
      items.forEach(function(item){
        var att = item.attachmentUrl;
        if(!att) return;
        var ext = extOf(item.attachmentName || att);
        if(!isVid(ext)) return;
        if(posterCache[att]) return;

        var sr = srvRel(att);
        var videoUrl = location.origin + sr;

        var v = document.createElement("video");
        v.preload = "metadata";
        v.muted = true;
        v.playsInline = true;
        v.crossOrigin = "use-credentials"; // same-origin SP request needs credentials
        v.src = videoUrl;

        v.onloadeddata = function(){
          var dur = isFinite(v.duration) && v.duration > 0 ? v.duration : 4;
          v.currentTime = Math.min(dur * 0.1, 2);
        };

        v.onseeked = function(){
          try{
            var c = document.createElement("canvas");
            c.width = 640; c.height = 360;
            c.getContext("2d").drawImage(v, 0, 0, 640, 360);
            var dataUrl = c.toDataURL("image/jpeg", 0.75);
            posterCache[att] = dataUrl;

            // Inject into any rendered card thumbs waiting for this URL
            var thumbs = root.querySelectorAll('[data-vidurl="'+att+'"]');
            thumbs.forEach(function(thumb){
              // Replace placeholder content with the real poster
              var ph = thumb.querySelector(".thumbPlaceholder");
              if(ph) ph.remove();
              var img = document.createElement("img");
              img.src = dataUrl;
              img.alt = "";
              img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;";
              thumb.insertBefore(img, thumb.firstChild);
              thumb.style.background = "#000";
            });
          } catch(e){}
          try{ v.src = ""; }catch(e){}
        };

        v.onerror = function(){ try{ v.src = ""; }catch(e){} };
        setTimeout(function(){ try{ v.src = ""; }catch(e){} }, 10000);
      });
    }

    function updateStats(){
      var now = new Date();
      var weekAgo = new Date(now - 7*24*60*60*1000);

      // New This Week — posts published in last 7 days
      var newThisWeek = S.items.filter(function(i){
        var d = new Date(i.publishDate||i.publishTime||0);
        return d >= weekAgo;
      }).length;

      // Videos — uploaded video files OR links to video platforms (Zoom, Teams, YouTube, Stream)
      var videoLinkPattern = /zoom\.us|teams\.microsoft\.com|youtube\.com|youtu\.be|microsoftstream\.com|sharepoint\.com.*\/(stream|video)/i;
      var videos = S.items.filter(function(i){
        return isVid(extOf(i.attachmentName||i.attachmentUrl))
          || (i.link && videoLinkPattern.test(i.link));
      }).length;

      // Most Liked — find top liked post
      var topLiked = S.items.slice().sort(function(a,b){ return (b.likeCount||0)-(a.likeCount||0); })[0];
      var topLikedCount = topLiked ? (topLiked.likeCount||0) : 0;
      var topLikedTitle = topLiked && topLikedCount > 0
        ? topLiked.headline.slice(0,28)+(topLiked.headline.length>28?"…":"")
        : "No likes yet";

      var pw = $("#wbStatPosts");    if(pw) pw.textContent = newThisWeek;
      var vw = $("#wbStatVideos");   if(vw) vw.textContent = videos;
      var fw = $("#wbStatFeatured"); if(fw){
        fw.textContent = topLikedCount > 0 ? "❤ "+topLikedCount : "—";

      var fl = $("#wbStatFeaturedLbl"); if(fl) fl.textContent = topLikedTitle;
    }

    // ── Like / Unlike ─────────────────────────
    // SVG thumb that CSS can color — emoji can't be recolored by CSS
    var THUMB_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="flex-shrink:0;margin-right:2px;"><path d="M2 20h2a1 1 0 0 0 1-1v-9a1 1 0 0 0-1-1H2v11zm19.83-7.12c.11-.25.17-.52.17-.88v-2c0-1.1-.9-2-2-2h-5.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 2S9.58 6.5 9 7.03V19c0 .55.45 1 1 1h9c.83 0 1.54-.5 1.84-1.22l3.03-6.9z"/></svg>';

    function updateLikeBtn(btn, liked, count){
      if(!btn) return;
      btn.innerHTML = THUMB_SVG + (count ? '<span style="font-size:12px;font-weight:700;">' + count + '</span>' : '');
      btn.title = liked ? "Unlike" : "Like";
      if(liked){ btn.classList.add("liked"); }
      else { btn.classList.remove("liked"); }
    }

    function toggleLike(id, btn){
      var item = S.items.filter(function(x){ return String(x.id) === String(id); })[0];
      if(!item || !currentUser) return;

      // Parse liked list from plain text column
      var likedList = item.likedBy ? item.likedBy.split(",").map(function(s){ return s.trim(); }).filter(Boolean) : [];
      var alreadyLiked = likedList.indexOf(currentUser) > -1;

      if(alreadyLiked){
        likedList = likedList.filter(function(u){ return u !== currentUser; });
        item.likeCount = Math.max(0, item.likeCount - 1);
      } else {
        likedList.push(currentUser);
        item.likeCount = item.likeCount + 1;
      }
      item.likedBy = likedList.join(",");
      var nowLiked = !alreadyLiked;

      // Update all like buttons for this post
      root.querySelectorAll('[data-like="'+id+'"]').forEach(function(b){
        updateLikeBtn(b, nowLiked, item.likeCount);
      });
      var rLike = $("#rLikeBtn");
      if(rLike && rLike._likeId === String(id)){
        updateLikeBtn(rLike, nowLiked, item.likeCount);
      }

      // Also keep localStorage in sync as a local cache
      try{
        var likedKey = "tmt_liked_"+currentUser.replace(/[^a-z0-9]/gi,"_");
        var likedIds = JSON.parse(localStorage.getItem(likedKey)||"[]");

    // ── Track View ────────────────────────────
    // Fires silently when a post is opened. One view per user, background write.
    function trackView(item){
      if(!item || !currentUser) return;

      // Check text column for cross-device deduplication
      var viewedList = item.viewedBy ? item.viewedBy.split(",").map(function(s){ return s.trim(); }).filter(Boolean) : [];
      if(viewedList.indexOf(currentUser) > -1) return; // already viewed

      viewedList.push(currentUser);
      item.viewCount = (item.viewCount || 0) + 1;
      item.viewedBy = viewedList.join(",");

      // Update visible view count
      root.querySelectorAll('[data-viewcount="'+item.id+'"]').forEach(function(el){
        el.textContent = "👁 " + item.viewCount;
      });

      // Also sync to localStorage
      try{
        var viewedKey = "tmt_viewed_"+currentUser.replace(/[^a-z0-9]/gi,"_");
        var viewedIds = JSON.parse(localStorage.getItem(viewedKey)||"[]");
        if(viewedIds.indexOf(String(item.id)) < 0){
          viewedIds.push(String(item.id));
          localStorage.setItem(viewedKey, JSON.stringify(viewedIds));
        }
      }catch(e){}

      // Write both count and viewed-by text to SP
      var enc2 = encodeURIComponent(LIST_TITLE).replace(/%20/g," ");
      getDigest().then(function(dg){

        if(viewCountField) p[viewCountField] = item.viewCount;
        if(viewedByField)  p[viewedByField]  = item.viewedBy;
        return spPost(api+"/web/lists/GetByTitle('"+enc2+"')/items("+item.id+")", p, dg, "MERGE");
      }).catch(function(e){
        console.warn("[TMT] View save failed:", e && e.message);
      });
    }

    // Build the correct URL to open an Office file in the browser viewer (?web=1)
    function buildOfficeOpenUrl(attUrl){
      var s = String(attUrl||"");
      // Strip Teams-specific params that cause 403 outside Teams context
      s = s.replace(/[?&](wdOrigin|wdExp|wdhostclicktime|wdLOR|wdPreviousSession|wdPreviousSessionSrc|TEAMS)[^&]*/gi, "")
           .replace(/\?&/, "?").replace(/&&+/g, "&").replace(/[?&]$/, "");
      if(/[?&]sourcedoc=/i.test(s)) return s; // already a Doc.aspx viewer URL
      return s.split("?")[0] + "?web=1";       // direct file URL — force browser viewer
    }

        } else {
          // Show link card — either loading or no image found

            + '<div id="rLinkStatus" style="font-size:11px;color:#5E8899;">'+statusMsg+'</div>'
            + '</div></div>';

          // If not yet attempted, fetch the og:image
          if(ogImg2 === undefined){
            ogCache[item.link] = null; // mark in-progress

            var ytM2 = item.link.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            if(ytM2){
              // YouTube video — get thumbnail directly
              var ytThumb2 = "https://img.youtube.com/vi/"+ytM2[1]+"/mqdefault.jpg";
              ogCache[item.link] = ytThumb2;
              vw.innerHTML =
                '<div style="margin-bottom:16px;border-radius:12px;overflow:hidden;background:#000;">'
                + '<img src="'+esc(ytThumb2)+'" alt="" style="width:100%;max-height:280px;object-fit:cover;display:block;" /></div>';
            } else {
              // Generic URL — try allorigins proxy with a 6s timeout
              var fetchDone = false;
              var fetchTimeout = setTimeout(function(){
                if(fetchDone) return;
                fetchDone = true;
                ogCache[item.link] = "";
                var s = root.querySelector("#rLinkStatus");
                if(s) s.textContent = "No preview available";
              }, 6000);

              fetch("https://api.allorigins.win/get?url="+encodeURIComponent(item.link))
                .then(function(r){ return r.json(); })
                .then(function(d){
                  if(fetchDone) return;
                  fetchDone = true;
                  clearTimeout(fetchTimeout);
                  var html = d.contents||"";
                  var m = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
                          || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
                  if(m && m[1]){
                    ogCache[item.link] = m[1];
                    vw.innerHTML =
                      '<div style="margin-bottom:16px;border-radius:12px;overflow:hidden;position:relative;background:#000;">'
                      + '<img src="'+esc(m[1])+'" alt="" style="width:100%;max-height:280px;object-fit:cover;display:block;" onerror="this.remove()" />'
                      + '<div style="position:absolute;bottom:0;left:0;right:0;padding:8px 14px;background:linear-gradient(transparent,rgba(0,0,0,.7));">'
                      + '<div style="font-size:10px;color:#9BB8C8;font-weight:700;">🔗 '+esc(linkDomain)+'</div>'

                  } else {
                    ogCache[item.link] = "";
                    var s2 = root.querySelector("#rLinkStatus");
                    if(s2) s2.textContent = "No preview available";
                  }
                }).catch(function(){
                  if(fetchDone) return;
                  fetchDone = true;
                  clearTimeout(fetchTimeout);
                  ogCache[item.link] = "";
                  var s3 = root.querySelector("#rLinkStatus");
                  if(s3) s3.textContent = "No preview available";
                });

          }

      $("#rTitle").textContent = item.headline || "News";
      var feat = ["yes","true","1"].indexOf(String(item.featured).toLowerCase()) > -1;

      // Render meta as styled pills

      $("#rMeta").innerHTML = metaParts.map(function(p){ return '<span>'+esc(p)+'</span>'; }).join("");

      $("#rBody").innerHTML = linkify(item.body || "");

      // Universal "Open ↗" button in modal header
      var rOpenBtn = $("#rOpenBtn");
      if(rOpenBtn){
        var openHref = "", openLabel = "↗ Open in new tab";
        if(item.attachmentUrl){
          if(vid){
            openHref = location.origin + srvRel(item.attachmentUrl);
          } else if(isOff(ext)){
            openHref = buildOfficeOpenUrl(item.attachmentUrl);

            + 'color:#032D42;border:none;border-radius:10px;font-family:inherit;font-weight:800;font-size:14px;'
            + 'cursor:pointer;box-shadow:0 4px 16px rgba(99,223,78,.25);">↗ Open in new tab</button>'
          : "";
      }

      var isAuthorRead = !item.author || !currentUser || item.author === currentUser;
      var acts = [];
      // Only show Open Link when there's a link AND it's different from the attachment
      // (avoids duplicate "open" buttons when the SP file URL is stored in both fields)
      if(item.link && item.attachmentUrl && normalizeUrl(item.link) !== normalizeUrl(item.attachmentUrl)){
        acts.push('<button class="btnP" onclick="window.open(\''+esc(item.link).replace(/'/g,"\\'")+'\',\'_blank\',\'noopener\')" style="cursor:pointer;">Open Link →</button>');
      }
      $("#rActions").innerHTML = acts.join("");

      // Edit button in footer
      var rEditBtn = $("#rEditBtn");
      if(rEditBtn){
        rEditBtn.style.display = isAuthorRead ? "inline-flex" : "none";
        rEditBtn.onclick = function(){ closeRead(); openEdit(item); };
      }

      // Like button in read modal footer
      var rLikeBtn = $("#rLikeBtn");
      if(rLikeBtn){
        rLikeBtn._likeId = String(item.id);
        var likedFromSP2 = currentUser && item.likedBy && item.likedBy.split(",").map(function(s){ return s.trim(); }).indexOf(currentUser) > -1;
        var likedKey3 = currentUser ? "tmt_liked_"+currentUser.replace(/[^a-z0-9]/gi,"_") : "";
        var likedIds3 = []; try{ if(likedKey3) likedIds3 = JSON.parse(localStorage.getItem(likedKey3)||"[]"); }catch(e){}
        var isLiked2 = likedFromSP2 || likedIds3.indexOf(String(item.id)) > -1;
        updateLikeBtn(rLikeBtn, isLiked2, item.likeCount);
        rLikeBtn.onclick = function(){ toggleLike(item.id, null); };
      }

      // Share buttons — set hash URL for this post
      var postUrl = location.href.split("#")[0] + "#post-" + item.id;

      var copyBtn = $("#rCopyLink");
      if(copyBtn) copyBtn.onclick = function(){
        try{
          if(navigator.clipboard && navigator.clipboard.writeText){
            navigator.clipboard.writeText(postUrl).then(function(){ showToast("✓ Link copied to clipboard"); });
          } else {
            // Fallback for older browsers
            var ta = document.createElement("textarea");
            ta.value = postUrl; ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            document.execCommand("copy"); document.body.removeChild(ta);
            showToast("✓ Link copied to clipboard");
          }
        }catch(e){ showToast("⚠ Copy failed — try manually"); }
      };

      var emailBtn = $("#rEmailBtn");
      if(emailBtn) emailBtn.onclick = function(){
        var subject = encodeURIComponent("Base Camp: " + (item.headline || "News Update"));
        var body = encodeURIComponent(
          (item.headline || "") + "\n\n"
          + (item.body ? item.body.slice(0, 300) + (item.body.length > 300 ? "…" : "") + "\n\n" : "")
          + "Read more: " + postUrl
        );
        location.href = "mailto:?subject=" + subject + "&body=" + body;
      };

      // Set URL hash so this post is bookmarkable / shareable
      try{ history.replaceState(null, "", location.href.split("#")[0] + "#post-" + item.id); }catch(e){}
      $("#readMo").classList.add("on");

      // Track view silently — fires once per user per post
      trackView(item);
    }

    function openEdit(item){
      S.editId = item.id;
      $("#moTitle").textContent = "Edit News";
      $("#tmtPublish").textContent = "Save";
      $("#tmtDelete").style.display = "inline-flex";
      $("#fHeadline").value = item.headline || "";

    function buildPayload(data){
      var p = {__metadata:{type:entityType}};
      p[fi("Title")||"Title"] = data.headline;
      var h = fi("Headline"); if(h) p[h] = data.headline;
      var b = fi("Body")||fi("Summary"); if(b) p[b] = data.body;
      var l = fi("Link"); if(l) p[l] = data.link||"";
      var c = fi("Category"); if(c) p[c] = data.category;
      var f = fi("Featured");
      if(f){ var ft=(fieldMap["Featured"]&&fieldMap["Featured"].t||"").toLowerCase();
             var v=yn(data.featured); p[f]=ft.indexOf("boolean")>-1?(v==="Yes"):v; }
      var pd = fi("Publish Date")||fi("PublishDate"); if(pd) p[pd] = data.pubIso||new Date().toISOString();
      var ed = fi("Expires On")||fi("ExpiresOn");     if(ed) p[ed] = data.expIso||null;
      return p;
    }

    function onPublish(){
      var headline = $("#fHeadline").value.trim();
      var body     = $("#fBody").value.trim();
      if(!headline){ setStatus("Headline is required.",true); return; }
      if(!body)    { setStatus("Body is required.",true);     return; }

      var category = $("#fCategory").value || "General";
      var featured = $("#fFeatured").value || "No";
      var link     = normalizeUrl($("#fLink").value.trim());
      var pubIso   = toIso($("#fPublishDate").value) || new Date().toISOString();
      var expIso   = toIso($("#fExpiresOn").value);

      $("#tmtPublish").disabled = true;
      setStatus("Working…");

      var enc = encodeURIComponent(LIST_TITLE).replace(/%20/g," ");

      getDigest().then(function(dg){
        if(S.file){
          var up = $("#uProg"); if(up) up.classList.add("on");
          setStatus("Uploading file…");
          return uploadFile(S.file, dg).then(function(res){
            return {dg:dg, attUrl:res.abs, attName:res.name};
          });
        }
        return {dg:dg, attUrl:"", attName:""};
      }).then(function(ctx){
        var p = buildPayload({headline:headline, body:body, link:link, category:category,
          featured:featured, pubIso:pubIso, expIso:expIso});
        var au = fi("Attachment URL"), an = fi("Attachment Name");
        if(S.editId){
          // If user clicked Remove, explicitly clear the attachment fields
          if(S.removeAttachment){ if(au) p[au]=""; if(an) p[an]=""; }
          else if(S.file){ if(au) p[au]=ctx.attUrl; if(an) p[an]=ctx.attName; }
          else if(S.urlAttachment){ if(au) p[au]=S.urlAttachment.url; if(an) p[an]=S.urlAttachment.name; }
          setStatus("Saving…");
          return spPost(api+"/web/lists/GetByTitle('"+enc+"')/items("+S.editId+")", p, ctx.dg, "MERGE");
        } else {
          if(au) p[au] = ctx.attUrl || (S.urlAttachment ? S.urlAttachment.url : "");
        if(an) p[an] = ctx.attName || (S.urlAttachment ? S.urlAttachment.name : "");
          setStatus("Publishing…");
          return spPost(api+"/web/lists/GetByTitle('"+enc+"')/items", p, ctx.dg);
        }
      }).then(function(){
        setStatus("Done!");
        closeMo();
        $("#tmtPublish").disabled = false;
        return loadItems();
      }).catch(function(e){
        setStatus(e.message||"Save failed.", true);
        $("#tmtPublish").disabled = false;
      });
    }

    function onDelete(){
      if(!S.editId) return;
      if(!confirm("Delete this post? This cannot be undone.")) return;
      $("#tmtDelete").disabled = true;

      var enc = encodeURIComponent(LIST_TITLE).replace(/%20/g," ");

        .catch(function(e){ setStatus(e.message||"Delete failed.", true); $("#tmtDelete").disabled = false; });
    }

          <div id="uCurrentName" style="font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          <div style="font-size:11px;color:var(--txm);margin-top:1px;">Current attachment</div>
        </div>
        <button id="uRemoveBtn" type="button" style="flex-shrink:0;padding:4px 10px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);border-radius:7px;color:rgba(248,113,113,.9);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">✕ Remove</button>

      <div class="up" id="uProg"><div class="pb"><div class="pf" id="pFill"></div></div><div class="pt"><span id="pLabel">Uploading…</span><span id="pPct">0%</span></div></div>
    </div>
  </div>
  <div class="mf">
    <div style="flex:1;display:flex;align-items:center;">
      <span id="moStatus" style="font-size:12px;font-weight:700;min-height:0;margin:0;padding:5px 12px;
        border-radius:8px;background:rgba(255,255,255,.06);display:none;"></span>

    <button class="btnD" id="tmtDelete" style="display:none;">Delete</button>

<div class="mo" id="readMo"><div class="md" style="max-width:900px;">
  <div class="mh">
    <div class="mt">Read</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="rOpenBtn"></span>
      <button class="mx" id="readCloseX">✕</button>

  <div class="mb">
    <div id="rVideoWrap"></div>

  </div>

    <div style="display:flex;gap:8px;flex:1;">
      <button class="btnS" id="rCopyLink" title="Copy link to this post" style="gap:6px;">🔗 Copy Link</button>
      <button class="btnS" id="rEmailBtn" title="Share via email" style="gap:6px;">📧 Email</button>
      <button class="btnS likeBtn" id="rLikeBtn" style="gap:6px;min-width:52px;">Like</button>

    // ── Wire events ───────────────────────────
    on($("#tmtAdd"),     "click",  openNewPost);

    // Detect SharePoint file URLs in Link field and show "Use as Attachment" prompt
    function isSpFileUrl(url){
      return /sharepoint\.com/i.test(url) && (
        /sharepoint\.com\/:([pwxb])(?:\/r)?:/i.test(url) ||
        /\.(pptx?|docx?|xlsx?|pdf)(\?|$)/i.test(url) ||
        /Doc2?\.aspx/i.test(url)
      );
    }
    on($("#fLink"), "input", function(){
      var val = (this.value||"").trim();
      var prompt = $("#fLinkSpPrompt");
      if(!prompt) return;
      var show = val && isSpFileUrl(val) && !S.file && !S.urlAttachment;
      prompt.style.display = show ? "flex" : "none";
      // Update icon based on type char
      var ico = prompt.querySelector("div");
      if(ico && show){
        var tc = val.match(/sharepoint\.com\/:([ pwxb]):/i);
        var m = {p:"📊",w:"📝",x:"📈",b:"📄"};
        ico.textContent = (tc && m[tc[1].toLowerCase()]) || (/Doc2?\.aspx/i.test(val) ? "📊" : "📎");
      }
    });
    on($("#fLinkUseAsAtt"), "click", function(){
      var linkVal = normalizeUrl(($("#fLink").value||"").trim());
      if(!linkVal) return;
      // Derive file type from sharing URL type character
      var tc6 = linkVal.match(/sharepoint\.com\/:([ pwxb])(?:\/r)?:/i);
      var tcMap6 = {p:"pptx",w:"docx",x:"xlsx",b:"pdf"};
      var ext6 = (tc6 && tcMap6[tc6[1].toLowerCase()])
        || (/\.(pptx?|docx?|xlsx?|pdf)(\?|$)/i.test(linkVal) ? extOf(linkVal) : null)
        || "pptx";
      var typeNames = {pptx:"PowerPoint",ppt:"PowerPoint",docx:"Word Document",doc:"Word Document",xlsx:"Excel",xls:"Excel",pdf:"PDF"};
      var dispName6 = (typeNames[ext6] || "SharePoint File") + "." + ext6;
      var icon6 = {pptx:"📊",ppt:"📊",docx:"📝",doc:"📝",xlsx:"📈",xls:"📈",pdf:"📄"}[ext6] || "📊";

      S.file = null;
      S.urlAttachment = {url: linkVal, name: dispName6};
      S.removeAttachment = false;
      var uZone = $("#uZone"); if(uZone) uZone.style.display = "none";
      var uCurrent = $("#uCurrent"); if(uCurrent) uCurrent.style.display = "flex";
      var uCurrentIcon = $("#uCurrentIcon"); if(uCurrentIcon) uCurrentIcon.textContent = icon6;
      var uCurrentName = $("#uCurrentName"); if(uCurrentName) uCurrentName.textContent = dispName6;
      var prompt = $("#fLinkSpPrompt"); if(prompt) prompt.style.display = "none";
      setStatus("Saved as attachment — slide thumbnail will appear after saving.");
      var uRemoveBtn = $("#uRemoveBtn");
      if(uRemoveBtn) uRemoveBtn.onclick = function(e){
        e.stopPropagation();
        S.urlAttachment = null; S.file = null;
        if(uCurrent) uCurrent.style.display = "none";
        if(uZone) uZone.style.display = "";
        var linkV = ($("#fLink").value||"").trim();
        var pr = $("#fLinkSpPrompt");
        if(pr) pr.style.display = (linkV && isSpFileUrl(linkV)) ? "flex" : "none";
        setStatus("");
      };
    });
    // Most Liked tile — click to open the top liked post
    on($("#wbStatTopLiked"), "click", function(){
      var top = S.items.slice().sort(function(a,b){ return (b.likeCount||0)-(a.likeCount||0); })[0];
      if(top && (top.likeCount||0) > 0) openRead(top.id);
    });
    on($("#tmtQ"),       "input",  function(e){ S.q = e.target.value||""; renderGrid(); });
    on($("#tmtSort"),    "change", function(e){ S.sort = e.target.value; renderGrid(); });
    on($("#tmtCat"),     "change", function(e){ S.cat = e.target.value; renderGrid(); });
    on($("#tmtViewToggle"), "click", function(){
      S.view = S.view === "grid" ? "list" : "grid";
      $("#tmtViewToggle").textContent = S.view === "list" ? "⊟" : "⊞";
      renderGrid();
    });
    on($("#tmtMoClose"), "click",  closeMo);
    on($("#tmtCancel"),  "click",  closeMo);
    on($("#tmtPublish"), "click",  onPublish);
    on($("#tmtDelete"),  "click",  onDelete);
    on($("#readCloseX"), "click",  closeRead);
    on($("#readCloseBtn"),"click", closeRead);
    on($("#readMo"),     "click",  function(e){ if(e.target === $("#readMo")) closeRead(); });
    on($("#tmtMo"),      "click",  function(e){ if(e.target === $("#tmtMo")) closeMo(); });

    // Welcome banner dismiss / show
    on($("#wbClose"), "click", function(){
      var wb = $("#wb"), btn = $("#wbShow");
      if(wb) wb.style.display = "none";
      if(btn) btn.style.display = "inline-flex";
    });
    on($("#wbShow"), "click", function(){
      var wb = $("#wb"), btn = $("#wbShow");
      if(wb) wb.style.display = "";
      if(btn) btn.style.display = "none";
    });

    // File input — overlaid directly, fires natively, no programmatic .click() needed
    on($("#fFile"), "change", function(){ onFileSelected(this.files && this.files[0]); });
    on($("#uZone"), "dragover",  function(e){ e.preventDefault(); $("#uZone").classList.add("dg"); });
    on($("#uZone"), "dragleave", function(){  $("#uZone").classList.remove("dg"); });
    on($("#uZone"), "drop", function(e){
      e.preventDefault(); $("#uZone").classList.remove("dg");
      var f = e.dataTransfer.files && e.dataTransfer.files[0];
      if(f) onFileSelected(f);
    });

    // ── Init ──────────────────────────────────
    loadMeta()
      .then(function(){ return loadCurrentUser(); })
      .then(function(){ return loadItems(); })
      .then(function(){
        if(!$("#tmtCat").value) $("#tmtCat").value = "All";
        $("#tmtSort").value = "newest";
        S.sort = "newest";
        renderGrid();
        // Auto-open post if URL contains #post-{id} (e.g. from a shared link)
        var hashMatch = location.hash.match(/^#post-(\d+)$/);
        if(hashMatch){
          var targetId = hashMatch[1];
          var target = S.items.filter(function(x){ return String(x.id) === targetId; })[0];
          if(target) setTimeout(function(){ openRead(targetId); }, 300);
        }
      })
      .catch(function(e){
        var grid = $("#tmtGrid");
        if(grid) grid.innerHTML = '<div style="color:rgba(248,113,113,.95);padding:10px 2px;font-size:13px;">'
          + '⚠️ Could not load posts: ' + esc(e && e.message ? e.message : String(e))
          + '<br><small style="color:#5E8899;">List: "'+LIST_TITLE+'" — check browser console (F12) for the full error URL and response.</small>'
          + '</div>';
      });
  }
})();
</script>
